# Rust development tools
tools:
  rust:
    manager: brew
    type: package
    check_command: command -v rustc
    description: "Rust compiler and standard toolchain"
    documentation_url: "https://www.rust-lang.org/"
    category: rust

  rustup:
    manager: brew
    type: package
    check_command: command -v rustup
    description: "Rust toolchain installer"
    documentation_url: "https://rustup.rs/"
    category: rust
