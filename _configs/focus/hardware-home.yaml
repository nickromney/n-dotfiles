# Home hardware and chargeable/premium applications
# Optional by design: run with `make install hardware-home`
tools:
  displaylink:
    manager: brew
    type: cask
    check_command: 'test -d "/Applications/DisplayLink Manager.app"'
    description: "DisplayLink USB graphics software"
    documentation_url: "https://www.displaylink.com/"
    category: hardware

  elgato-control-center:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/Elgato Control Center.app' ]"
    description: "Control center app for Elgato devices"
    documentation_url: "https://www.elgato.com/en/downloads"
    category: hardware

  logi-tune:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/Logi Tune.app' ]"
    description: "Logitech device management utility"
    documentation_url: "https://www.logitech.com/en-us/video-collaboration/software/logi-tune-software.html"
    category: hardware

  vocaster-hub:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/Vocaster Hub.app' ]"
    description: "Control software for Focusrite Vocaster devices"
    documentation_url: "https://focusrite.com/en/vocaster"
    category: hardware
