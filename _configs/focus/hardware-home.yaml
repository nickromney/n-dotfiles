# Home hardware and chargeable/premium applications
# Optional by design: run with `make install hardware-home`
tools:
  displaylink:
    manager: brew
    type: cask
    check_command: 'test -d "/Applications/DisplayLink Manager.app"'
    description: "DisplayLink USB graphics software"
    documentation_url: "https://www.displaylink.com/"
    category: hardware

  hey:
    manager: brew
    type: cask
    check_command: "brew list --cask | grep -q hey"
    description: "Modern email client with built-in workflows"
    documentation_url: "https://www.hey.com/"
    category: productivity

  logi-tune:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/Logi Tune.app' ]"
    description: "Logitech device management utility"
    documentation_url: "https://www.logitech.com/en-us/video-collaboration/software/logi-tune-software.html"
    category: hardware

  elgato-control-center:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/Elgato Control Center.app' ]"
    description: "Control center app for Elgato devices"
    documentation_url: "https://www.elgato.com/en/downloads"
    category: hardware

  vocaster-hub:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/Vocaster Hub.app' ]"
    description: "Control software for Focusrite Vocaster devices"
    documentation_url: "https://focusrite.com/en/vocaster"
    category: hardware

  bloom:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/Bloom.app' ]"
    description: "Bloom desktop application"
    documentation_url: "https://bloomapp.club/"
    category: productivity

  daisy-disk:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/DaisyDisk.app' ]"
    description: "Disk space analyzer for macOS"
    documentation_url: "https://daisydiskapp.com/"
    category: utilities

  gitkraken:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/GitKraken.app' ]"
    description: "Git GUI client"
    documentation_url: "https://www.gitkraken.com/"
    category: development

  proxyman:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/Proxyman.app' ]"
    description: "HTTP(S) traffic capture and debugging proxy"
    documentation_url: "https://proxyman.com/"
    category: development

  spokenly:
    manager: manual
    type: check
    check_command: "[ -d '/Applications/Spokenly.app' ]"
    description: "Spokenly desktop application"
    documentation_url: "https://spokenly.app/"
    category: productivity
