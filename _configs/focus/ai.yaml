# AI/ML development tools
tools:
  claude:
    manager: arkade
    type: get
    check_command: command -v claude
    description: "Claude AI coding assistant CLI"
    documentation_url: "https://claude.ai/code"
    category: ai

  codex:
    manager: arkade
    type: get
    check_command: command -v codex
    description: "OpenAI coding agent for the terminal"
    documentation_url: "https://github.com/openai/codex"
    category: ai

  codex-app:
    manager: brew
    type: cask
    check_command: "[ -d '/Applications/Codex.app' ]"
    description: "OpenAI Codex desktop application"
    documentation_url: "https://openai.com/codex"
    category: ai

  opencode:
    manager: arkade
    type: get
    check_command: command -v opencode
    description: "AI coding agent built for the terminal"
    documentation_url: "https://opencode.ai"
    category: ai

  copilot:
    manager: arkade
    type: get
    check_command: command -v copilot
    description: "GitHub Copilot coding agent for the terminal"
    documentation_url: "https://docs.github.com/en/copilot/concepts/agents/about-copilot-cli"
    category: ai

  droid:
    manager: brew
    type: cask
    check_command: command -v droid
    description: "Factory Droid AI software engineering agent"
    documentation_url: "https://docs.factory.ai/cli/getting-started/overview"
    category: ai

  gemini-cli:
    manager: brew
    type: package
    check_command: command -v gemini
    description: "Google Gemini command-line interface"
    documentation_url: "https://github.com/google-gemini/gemini-cli"
    category: ai

  steipete/tap:
    manager: brew
    type: tap
    check_command: "brew tap | grep -q '^steipete/tap$'"
    description: "Homebrew tap for Steipete casks"
    documentation_url: "https://github.com/steipete/homebrew-tap"
    category: ai

  codexbar:
    manager: brew
    type: cask
    check_command: "brew list --cask | grep -q '^codexbar$'"
    install_args: ["steipete/tap/codexbar"]
    description: "Menu bar companion for Codex"
    documentation_url: "https://github.com/steipete/codexbar"
    category: ai

  llm:
    manager: brew
    type: package
    check_command: command -v llm
    description: "CLI for interacting with large language models"
    documentation_url: "https://github.com/simonw/llm"
    category: ai

  code2prompt:
    manager: cargo
    type: binary
    check_command: command -v code2prompt
    description: "Generate prompts from codebases for LLMs"
    documentation_url: "https://github.com/raphaelmansuy/code2prompt"
    category: ai
