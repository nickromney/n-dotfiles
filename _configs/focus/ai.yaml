# AI/ML development tools
tools:
  steipete/tap:
    manager: brew
    type: tap
    check_command: "brew tap | grep -q '^steipete/tap$'"
    description: "Homebrew tap for Steipete casks"
    documentation_url: "https://github.com/steipete/homebrew-tap"
    category: ai

  repobar:
    manager: brew
    type: cask
    check_command: "brew list --cask | grep -q '^repobar$'"
    install_args: ["steipete/tap/repobar"]
    description: "Menu bar repo status app"
    documentation_url: "https://github.com/steipete/repobar"
    category: ai

  codexbar:
    manager: brew
    type: cask
    check_command: "brew list --cask | grep -q '^codexbar$'"
    install_args: ["steipete/tap/codexbar"]
    description: "Menu bar companion for Codex"
    documentation_url: "https://github.com/steipete/codexbar"
    category: ai

  llm:
    manager: brew
    type: package
    check_command: command -v llm
    description: "CLI for interacting with large language models"
    documentation_url: "https://github.com/simonw/llm"
    category: ai

  code2prompt:
    manager: cargo
    type: binary
    check_command: command -v code2prompt
    description: "Generate prompts from codebases for LLMs"
    documentation_url: "https://github.com/raphaelmansuy/code2prompt"
    category: ai
