name: Test Setup Scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          ./_test/shellcheck.sh

  test:
    needs: shellcheck
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install BATS and stow (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Clone bats-core directly to avoid apt service restart issues
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core
          cd /tmp/bats-core
          sudo ./install.sh /usr/local
          sudo apt-get update
          sudo apt-get install -y stow

      - name: Install BATS and stow (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install bats-core stow

      - name: Run cross-platform suites (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          export PATH="/usr/local/bin:$PATH"
          which bats
          bats --version
          bats _test/cli-contracts.bats
          bats _test/makefile.bats

      - name: Run macOS tests (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          which bats
          bats --version
          ./_test/run_macos_tests.sh
          bats _test/cli-contracts.bats
          bats _test/makefile.bats
          bats _test/bootstrap.bats
          bats _test/setup-personal-mac.bats

      - name: Stow dry-run in isolated HOME
        run: |
          fresh_home="$(mktemp -d)"
          HOME="$fresh_home" ./stow.sh --dry-run

      - name: Bootstrap dry-run (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Isolated HOME so the runner's real dotfiles cannot cause stow conflicts
          fresh_home="$(mktemp -d)"
          HOME="$fresh_home" ./bootstrap.sh --dry-run --no-input --skip-1password
